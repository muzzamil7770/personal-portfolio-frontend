<div class="scroll-demo" #wrapper>

  <!-- Fixed canvas background -->
  <canvas #canvas class="canvas-bg"></canvas>

  <!-- Back link -->
  <a routerLink="/" class="back-btn">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M19 12H5M12 5l-7 7 7 7"/>
    </svg>
    Back to Portfolio
  </a>

  <!-- Scroll sections -->
  <section
    *ngFor="let section of sections; let i = index"
    class="scroll-section"
    [class.align-right]="i % 2 === 0"
    [class.align-left]="i % 2 !== 0"
    [attr.data-index]="i">

    <div class="glass-card" [style.--accent]="section.accent">
      <span class="section-label">{{ section.subtitle }}</span>
      <h2 class="section-title">{{ section.title }}</h2>
      <p class="section-desc">{{ section.description }}</p>
      <div class="accent-bar"></div>
    </div>

  </section>

  <!-- Scroll indicator (visible only at top) -->
  <div class="scroll-hint">
    <span>Scroll to explore</span>
    <div class="scroll-arrow">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 5v14M5 12l7 7 7-7"/>
      </svg>
    </div>
  </div>

</div>
