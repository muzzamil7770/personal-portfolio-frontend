<div class="calendar-container" [class.show]="isVisible">
    <div class="calendar-card glass">
        <div class="calendar-header">
            <div class="header-content">
                <h2>{{ isAdmin ? 'Manage Availability' : 'Schedule a Meeting' }}</h2>
                <p>{{ isAdmin ? 'Click or drag on the calendar to add new availability slots.' : 'Select an available time slot on the calendar.' }}</p>
            </div>
            <div class="header-actions">
                <div class="admin-badge" *ngIf="isAdmin">
                    <i class="fas fa-user-shield"></i> Admin Mode
                </div>
                <button class="close-btn" (click)="close()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
        </div>

        <div class="calendar-body">
            <div class="calendar-wrapper">
                <div #calendarEl class="fc-native-container"></div>
            </div>
            
            <div class="calendar-footer" *ngIf="!isAdmin">
                <div class="legend">
                    <div class="legend-item"><span class="dot available"></span> Available</div>
                    <div class="legend-item"><span class="dot booked"></span> Booked</div>
                </div>
            </div>
        </div>
    </div>
</div>
