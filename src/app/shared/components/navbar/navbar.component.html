<nav class="navbar">
  <div class="container">
    <a href="#home" class="navbar-brand">{{ siteData.nav.name }}</a>

    <div class="navbar-menu">
      <div id="nav-links">
@for (link of siteData.nav.links; track link.href; let i = $index) {
          <a [href]="link.href" [class.active]="i === activeLinkIndex()" class="nav-link">{{ link.label }}</a>
        }
        <a href="#hire" class="nav-link" id="hire-me-nav" (click)="openHireMeModal(); $event.preventDefault()" style="background: var(--primary); color: #ffffff; font-weight: 600;">
          {{ siteData.nav.hireMe.label }}
        </a>
      </div>
      <div class="theme-toggle" id="theme-toggle" role="button" aria-label="Toggle theme" tabindex="0" (click)="themeService.toggleTheme()">
        <div class="theme-toggle-circle">
          <i class="fas fa-moon"></i>
        </div>
      </div>
    </div>

    <div class="mobile-toggle">
      <div class="theme-toggle" id="theme-toggle-mobile" role="button" aria-label="Toggle theme" tabindex="0" (click)="themeService.toggleTheme()">
        <div class="theme-toggle-circle">
          <i class="fas fa-moon"></i>
        </div>
      </div>
      <button id="menu-btn" aria-label="Toggle menu" (click)="uiService.toggleMobileMenu()">
        <svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="color: var(--text-secondary);">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>
    </div>
  </div>
</nav>
